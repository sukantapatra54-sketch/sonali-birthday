<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sonali ❤️</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
text-align:center;
color:white;
font-family:Segoe UI;
}

/* intro */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

#intro h1{
font-size:45px;
color:red;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px red}
to{text-shadow:0 0 40px red}
}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.3}
to{opacity:1}
}

/* photo */

img{
width:200px;
border-radius:20px;
box-shadow:0 0 40px hotpink;
margin-top:40px;
}

/* cake */

.cake{
position:relative;
margin:100px auto;
width:220px;
height:160px;
background:#ff4da6;
border-radius:15px;
box-shadow:0 0 30px pink;
}

.candle{
position:absolute;
width:20px;
height:70px;
background:white;
top:-70px;
}

.flame{
width:20px;
height:20px;
background:orange;
border-radius:50%;
position:absolute;
top:-20px;
animation:flicker .2s infinite;
}

@keyframes flicker{
0%{opacity:1}
50%{opacity:.5}
100%{opacity:1}
}

/* message */

#message{
display:none;
font-size:22px;
color:gold;
margin-top:20px;
}

/* hearts */

.heart{
position:absolute;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

/* fireworks */

.firework{
position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:explode 1s forwards;
}

@keyframes explode{
from{transform:scale(1);opacity:1}
to{transform:scale(20);opacity:0}
}

/* balloons */

.balloon{
position:absolute;
width:40px;
height:50px;
border-radius:50%;
animation:rise 6s linear forwards;
}

@keyframes rise{
from{transform:translateY(100vh)}
to{transform:translateY(-120vh)}
}

</style>
</head>

<body>

<div id="intro">
<h1>For My Sweetheart Sonali ❤️</h1>
</div>

<h1>Blow the Candle Sweetheart 🎂</h1>

<img src="IMG_20260302_151050.jpg">

<div class="cake" id="cake"></div>

<div id="message">
🎉 Happy Birthday Sweetheart Sonali 🎉
<br>
You Are My Forever Love ❤️
</div>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

/* hide intro */

setTimeout(()=>{
document.getElementById("intro").style.display="none";
},3000);

/* stars */

for(let i=0;i<150;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

document.body.appendChild(star);

}

/* candles */

let cake=document.getElementById("cake");

for(let i=0;i<6;i++){

let candle=document.createElement("div");

candle.className="candle";

candle.style.left=(20+i*30)+"px";

let flame=document.createElement("div");

flame.className="flame";

candle.appendChild(flame);

cake.appendChild(candle);

}

/* hearts */

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);

},500);

/* mic detect */

navigator.mediaDevices.getUserMedia({audio:true})
.then(stream=>{

const audioContext=new AudioContext();

const microphone=audioContext.createMediaStreamSource(stream);

const analyser=audioContext.createAnalyser();

microphone.connect(analyser);

analyser.fftSize=256;

const data=new Uint8Array(analyser.frequencyBinCount);

function detect(){

analyser.getByteFrequencyData(data);

let volume=data.reduce((a,b)=>a+b)/data.length;

if(volume>18){

blow();

}

requestAnimationFrame(detect);

}

detect();

});

function blow(){

document.querySelectorAll(".flame").forEach(f=>f.style.display="none");

document.getElementById("message").style.display="block";

/* fireworks */

for(let i=0;i<20;i++){

let fw=document.createElement("div");

fw.className="firework";

fw.style.left=Math.random()*100+"vw";

fw.style.top=Math.random()*60+"vh";

document.body.appendChild(fw);

setTimeout(()=>fw.remove(),1000);

}

/* balloons */

for(let i=0;i<10;i++){

let balloon=document.createElement("div");

balloon.className="balloon";

balloon.style.left=Math.random()*100+"vw";

balloon.style.background=`hsl(${Math.random()*360},70%,60%)`;

document.body.appendChild(balloon);

setTimeout(()=>balloon.remove(),6000);

}

}

</script>

</body>
</html>
