<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sonali ❤️</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
text-align:center;
color:white;
font-family:Segoe UI;
}

/* Marvel intro */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

#intro h1{
font-size:60px;
color:red;
letter-spacing:10px;
animation:marvel 3s forwards;
}

@keyframes marvel{
0%{transform:scale(0.2);opacity:0;}
50%{opacity:1;}
100%{transform:scale(1.3);opacity:0;}
}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* photo */

img{
width:200px;
border-radius:20px;
box-shadow:0 0 40px hotpink;
margin-top:40px;
}

/* cake */

.cake{
position:relative;
margin:100px auto;
width:220px;
height:160px;
background:#ff4da6;
border-radius:15px;
box-shadow:0 0 30px pink;
}

.candle{
position:absolute;
width:20px;
height:70px;
background:white;
top:-70px;
}
.flame{

50%{opacity:.5;}
100%{opacity:1;}
}

#message{
display:none;
font-size:22px;
color:gold;
margin-top:20px;
}

</style>
</head>

<body>

<div id="intro">
<h1>SONALI</h1>
</div>

<h1>Blow the Candle Sweetheart 🎂</h1>

<img src="IMG_20260302_151050.jpg">

<div class="cake" id="cake"></div>

<div id="message">
🎉 Happy Birthday Sweetheart Sonali 🎉<br>
You Are My Forever Love ❤️
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_2b1d7c0a5b.mp3">
</audio>

<script>

/* intro hide */

setTimeout(()=>{
document.getElementById("intro").style.display="none";
},3000);

/* music start */

document.body.addEventListener("click",()=>{
document.getElementById("music").play();
});

/* stars */

for(let i=0;i<150;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

document.body.appendChild(star);

}

/* candles */

let cake=document.getElementById("cake");

for(let i=0;i<6;i++){

let candle=document.createElement("div");

candle.className="candle";

candle.style.left=(20+i*30)+"px";

let flame=document.createElement("div");

flame.className="flame";

candle.appendChild(flame);

cake.appendChild(candle);

}
.flame{
position:absolute;
width:14px;
height:20px;
background:orange;
border-radius:50%;
top:-20px;
left:3px;
box-shadow:0 0 20px yellow;
animation:flicker 0.2s infinite;
  }
/* mic detect */

navigator.mediaDevices.getUserMedia({audio:true})
.then(stream=>{

const audioContext=new AudioContext();

const microphone=audioContext.createMediaStreamSource(stream);

const analyser=audioContext.createAnalyser();

microphone.connect(analyser);

analyser.fftSize=256;

const data=new Uint8Array(analyser.frequencyBinCount);

function detect(){

analyser.getByteFrequencyData(data);

let volume=data.reduce((a,b)=>a+b)/data.length;

if(volume>18){

document.querySelectorAll(".flame").forEach(f=>f.style.display="none");

document.getElementById("message").style.display="block";

}

requestAnimationFrame(detect);

}

detect();

});

</script>

</body>
</html>
