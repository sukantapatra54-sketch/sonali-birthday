<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sonali ❤️</title>

<style>

body{
margin:0;
overflow:hidden;
color:white;
font-family:Segoe UI;
text-align:center;
  
background:
radial-gradient(circle at 20% 30%, #3a0066, black 60%),
radial-gradient(circle at 80% 70%, #001a66, black 60%),
radial-gradient(circle at 50% 50%, #330033, black 70%);

background-size:200% 200%;

animation:galaxyMove 25s linear infinite;
}

@keyframes galaxyMove{

0%{
background-position:0% 0%,100% 100%,50% 50%;
}

50%{
background-position:50% 50%,20% 80%,70% 30%;
}

100%{
background-position:0% 0%,100% 100%,50% 50%;
}

}

/* MARVEL INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#intro h1{
font-size:80px;
color:red;
letter-spacing:10px;
animation:intro 3s forwards;
}

@keyframes intro{
0%{transform:scale(0.2);opacity:0}
50%{opacity:1}
100%{transform:scale(2);opacity:0}
}

/* galaxy stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2}
to{opacity:1}
}
#galaxyName{
position:relative;
margin-top:40px;
font-size:90px;
font-weight:bold;
letter-spacing:10px;
color:white;

text-shadow:
0 0 10px #fff,
0 0 20px #ff00ff,
0 0 40px #ff00ff,
0 0 80px #ff00ff;

animation:glowName 3s ease-in-out infinite alternate;
}



@keyframes glowName{
from{
text-shadow:0 0 10px #fff,0 0 20px #ff00ff;
}
to{
text-shadow:0 0 20px #fff,0 0 40px #00ffff;
}
}
/* shooting star */

.shoot{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 2s linear infinite;
}

@keyframes shoot{
0%{transform:translate(0,0)}
100%{transform:translate(-800px,400px)}
}

/* photo */

img{
width:220px;
border-radius:20px;
box-shadow:0 0 40px hotpink;
margin-top:40px;
}

/* cake */
.cake{
position:relative;
width:160px;
height:120px;
margin:80px auto;
animation:cakeFloat 3s ease-in-out infinite;
}

.layer{
position:absolute;
left:0;
right:0;
margin:auto;
height:35px;
border-radius:10px;
box-shadow:0 0 15px pink;
}

.layer1{
bottom:0;
width:160px;
background:#ff4da6;
}

.layer2{
bottom:35px;
width:120px;
background:#ff85c1;
}

.layer3{
bottom:70px;
width:80px;
background:#ffc1e3;
}

@keyframes cakeFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}
/* candle */

.candle{
position:absolute;
width:20px;
height:70px;
background:white;
top:-60px;
}

/* flame */

.flame{
position:absolute;
width:14px;
height:20px;
background:orange;
border-radius:50%;
top:-20px;
left:3px;
box-shadow:0 0 20px yellow;
animation:flicker 0.2s infinite;
}

@keyframes flicker{
0%{opacity:1}
50%{opacity:0.5}
100%{opacity:1}
}
#message{
display:none;
font-size:22px;
color:gold;
margin:120px auto;
max-width:600px;
line-height:1.6;
animation:fade 2s;
}



@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* hearts */

.heart{
position:absolute;
color:red;
font-size:24px;
animation:float 5s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

/* fireworks */

.firework{
position:absolute;
width:6px;
height:6px;
background:yellow;
box-shadow:0 0 20px orange;
animation:explode 1s linear;
}

@keyframes explode{
0%{transform:scale(1)}
100%{transform:scale(20);opacity:0}
}
@keyframes galaxyMove{

0%{
background-position:0% 0%,100% 100%,50% 50%;
}

50%{
background-position:50% 50%,20% 80%,70% 30%;
}

100%{
background-position:0% 0%,100% 100%,50% 50%;
}

}
</style>
</head>

<body>

<div id="intro">
<h1>SONALI</h1>
</div>

<h2>Blow the Candle Sweetheart 🎂</h2>

<img src="IMG_20260302_151050.jpg">
<div class="cake" id="cake">
  <div class="layer layer1"></div>
  <div class="layer layer2"></div>
  <div class="layer layer3"></div>
  <div class="candle" style="left:30px">
<div class="flame"></div>
</div>

<div class="candle" style="left:70px">
<div class="flame"></div>
</div>

<div class="candle" style="left:110px">
<div class="flame"></div>
</div>
</div>
<div id="message">
<span id="typeText"></span>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8d8f0d7b7.mp3">
</audio>

<script>
let text = `🎉 HAPPY BIRTHDAY MY QUEEN SONALI 🎉,

The day you were born,
the universe became a little more beautiful. ✨

Among billions of stars in this galaxy,
you are the brightest one in my life. 🌌

You are not just my love,
you are my happiness, my peace, and my forever. ❤️

Every moment with you feels like a dream
that I never want to end.

💖 Happy Birthday My Sweetheart 💖

I Promise I Will Love You
Today, Tomorrow, and Forever.

✨ Forever Yours — Sukanta ✨`;

let i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("typeText").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}
/* intro hide */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("message").style.display="block";
typeWriter();
},3000);
/* music */

document.body.addEventListener("click",()=>{
document.getElementById("music").play();
});

/* stars */

for(let i=0;i<150;i++){

let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
document.body.appendChild(star);

}

/* shooting stars */

setInterval(()=>{

let s=document.createElement("div");
s.className="shoot";
s.style.left="100vw";
s.style.top=Math.random()*200+"px";
document.body.appendChild(s);

setTimeout(()=>s.remove(),2000);

},3000);

/* cake candles */

let cake=document.getElementById("cake");

for(let i=0;i<6;i++){

let candle=document.createElement("div");
candle.className="candle";
candle.style.left=(20+i*30)+"px";

let flame=document.createElement("div");
flame.className="flame";

candle.appendChild(flame);
cake.appendChild(candle);

}

/* hearts */

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);

},500);
function fireworks(){

for(let i=0;i<8;i++){

let x = Math.random()*window.innerWidth;
let y = Math.random()*window.innerHeight*0.6;

for(let j=0;j<40;j++){

let particle=document.createElement("div");

particle.style.position="absolute";
particle.style.width="6px";
particle.style.height="6px";
particle.style.borderRadius="50%";

let colors=["red","yellow","blue","orange","lime","cyan","magenta"];
particle.style.background=colors[Math.floor(Math.random()*colors.length)];

particle.style.left=x+"px";
particle.style.top=y+"px";

document.body.appendChild(particle);

let angle=Math.random()*2*Math.PI;
let distance=80+Math.random()*120;

let dx=Math.cos(angle)*distance;
let dy=Math.sin(angle)*distance;

particle.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${dx}px,${dy}px)`,opacity:0}
],{
duration:1200,
easing:"ease-out"
});

setTimeout(()=>particle.remove(),1200);

}

}

  }

/* mic detect */

navigator.mediaDevices.getUserMedia({audio:true})
.then(stream=>{

const audioContext=new AudioContext();
const microphone=audioContext.createMediaStreamSource(stream);
const analyser=audioContext.createAnalyser();

microphone.connect(analyser);
analyser.fftSize=256;

const data=new Uint8Array(analyser.frequencyBinCount);

function detect(){

analyser.getByteFrequencyData(data);

let volume=data.reduce((a,b)=>a+b)/data.length;

if(volume>18){

document.querySelectorAll(".flame")
.forEach(f=>f.style.display="none");

document.getElementById("message")
.style.display="block";

fireworks();

}

requestAnimationFrame(detect);

}

detect();

});

</script>
  
<div id="galaxyName">SONALI</div>
  
</body>
</html>
