<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sonali ❤️</title>
<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    text-align:center;
    color:white;
    font-family: 'Segoe UI';
}
h1{
    margin-top:40px;
    font-size:30px;
}
.cake{
    position:relative;
    margin:100px auto;
    width:200px;
    height:150px;
    background:#ff69b4;
    border-radius:10px;
}
.candle{
    position:absolute;
    width:20px;
    height:60px;
    background:white;
    left:90px;
    top:-60px;
}
.flame{
    position:absolute;
    width:20px;
    height:20px;
    background:orange;
    border-radius:50%;
    top:-20px;
    left:0;
    animation:flicker 0.2s infinite;
}
@keyframes flicker{
    0%{opacity:1;}
    50%{opacity:0.6;}
    100%{opacity:1;}
}
.hidden{
    display:none;
}
.message{
    font-size:26px;
    margin-top:30px;
    color:gold;
}
</style>
</head>
<body>

<h1>Blow the Candle Sweetheart 🎂</h1>

<div class="cake">
    <div class="candle">
        <div class="flame" id="flame"></div>
    </div>
</div>

<div class="message hidden" id="message">
🎉 Happy 22nd Birthday Sweetheart Sonali 🎉 <br>
You Are My Forever Love ❤️ <br>
9 March – The Day My Queen Was Born 👑
</div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script>
navigator.mediaDevices.getUserMedia({ audio: true })
.then(function(stream) {
    const audioContext = new AudioContext();
    const microphone = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();
    microphone.connect(analyser);
    analyser.fftSize = 256;
    const dataArray = new Uint8Array(analyser.frequencyBinCount);

    function detectBlow(){
        analyser.getByteFrequencyData(dataArray);
        let volume = dataArray.reduce((a,b)=>a+b)/dataArray.length;

        if(volume > 60){
            document.getElementById("flame").classList.add("hidden");
            document.getElementById("message").classList.remove("hidden");
            document.getElementById("music").play();
        }
        requestAnimationFrame(detectBlow);
    }
    detectBlow();
});
</script>

</body>
</html>
