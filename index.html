<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sonali ❤️</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  text-align:center;
  color:white;
  font-family:Segoe UI;
}

h1{
  margin-top:40px;
  font-size:28px;
}

.cake{
  position:relative;
  margin:280px auto;
  width:220px;
  height:160px;
  background:#ff4da6;
  border-radius:15px;
  box-shadow:0 0 30px pink;
}

.candle{
  position:absolute;
  width:20px;
  height:70px;
  background:white;
  left:100px;
  top:-70px;
}

.flame{
  position:absolute;
  width:20px;
  height:20px;
  background:orange;
  border-radius:50%;
  top:-25px;
  animation:flicker 0.2s infinite;
  box-shadow:0 0 20px yellow;
}

@keyframes flicker{
  0%{opacity:1;}
  50%{opacity:0.5;}
  100%{opacity:1;}
}

.hidden{
  display:none;
}

.message{
  font-size:22px;
  margin-top:30px;
  color:gold;
  animation:fade 3s ease-in;
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}

.heart{
  position:absolute;
  color:red;
  font-size:20px;
  animation:float 5s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* Fireworks */
.firework {
  position: absolute;
  width: 6px;
  height: 6px;
  background: yellow;
  border-radius: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  from { transform: scale(1); opacity:1; }
  to { transform: scale(15); opacity:0; }
}

/* Balloons */
.balloon {
  position: absolute;
  width: 40px;
  height: 50px;
  border-radius: 50%;
  animation: rise 6s linear forwards;
}

@keyframes rise {
  from { transform: translateY(100vh); }
  to { transform: translateY(-120vh); }
}

</style>
</head>

<body>

<h1>Blow the Candle Sweetheart 🎂</h1>
<div class="cake" id="cake"></div>
<div class="message hidden" id="message">
🎉 Happy 22nd Birthday Sweetheart Sonali 🎉 <br>
You Are My Forever Love ❤️ <br>
9 March – The Day My Queen Was Born 👑
</div>

<audio id="music" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
// create many candles
let cake = document.getElementById("cake");

for(let row=0; row<2; row++){
  for(let i=0; i<6; i++){
    let candle = document.createElement("div");
    candle.className = "candle";
    candle.style.left = (20 + i*30) + "px";
    candle.style.top = (-70 - row*40) + "px";

    let flame = document.createElement("div");
    flame.className = "flame";

    candle.appendChild(flame);
    cake.appendChild(candle);
  }
}
// floating hearts
setInterval(()=>{
  let heart=document.createElement("div");
  heart.innerHTML="❤️";
  heart.className="heart";
  heart.style.left=Math.random()*100+"vw";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
},500);

// mic blow detect
let audioContext;
let analyser;
let microphone;
let dataArray;

async function startMic(){

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  microphone = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();

  microphone.connect(analyser);
  analyser.fftSize = 256;

  const bufferLength = analyser.frequencyBinCount;
  dataArray = new Uint8Array(bufferLength);

  detectBlow();
}

function detectBlow(){

  analyser.getByteFrequencyData(dataArray);

  let volume = dataArray.reduce((a,b)=>a+b) / dataArray.length;

  if(volume > 20){
      blowCandle();
      return;
  }

  requestAnimationFrame(detectBlow);
}

function blowCandle(){

  document.querySelectorAll(".flame").forEach(f=>{
    f.style.display="none";
  });

  document.getElementById("message").classList.remove("hidden");

  for(let i=0;i<20;i++){
    let fw=document.createElement("div");
    fw.className="firework";
    fw.style.left=Math.random()*100+"vw";
    fw.style.top=Math.random()*60+"vh";
    document.body.appendChild(fw);
    setTimeout(()=>fw.remove(),1000);
  }

  for(let i=0;i<10;i++){
    let balloon=document.createElement("div");
    balloon.className="balloon";
    balloon.style.left=Math.random()*100+"vw";
    balloon.style.background=`hsl(${Math.random()*360},70%,60%)`;
    document.body.appendChild(balloon);
    setTimeout(()=>balloon.remove(),6000);
  }
}

document.body.addEventListener("click", startMic);
</script>

</body>
</html>
